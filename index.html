<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>DRMusic</title>

</head>


<body>

    <h1>Music Records (GET)</h1>
    <div id="app">
        <h2>Get All Records</h2>
        <button id="getAllButton" v-on:click="getAllRecords" class="btn btn-primary">Get all records</button>
        <br />
        <ul id="recordlist" v-if="records.length">
            <li v-for="record in records" :key="record.id">
                {{record.id}} : {{record.title }} {{ record.artist}} {{ record.duration}} {{ record.publicationYear}}
            </li>
        </ul>
        <div v-else>No Records</div>

    
    <script src="index.js"></script>

</body>
</html>
